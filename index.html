<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1280">
<title>Marxist.com — Home of the Revolutionary Communist International</title>

<link rel="stylesheet" href="ds/colors_and_type.css">

<style>
  /* ────────────────────────────────────────────────────────────
     Marxist.com homepage — print-materiality styling
     ──────────────────────────────────────────────────────────── */

  :root {
    /* Page surface — newspaper paper (no warm tint when texture=none) */
    --page-bg: #f6efef;
    --page-bg-dark: #181513;
    --paper: #f6efef;
    --paper-soft: #ece4e4;
    --rule: var(--rci-ink);
    --rule-soft: #b8b0ac;
  }

  html, body { margin: 0; padding: 0; }
  html { background: var(--page-bg); }
  body {
    background: var(--page-bg);
    color: var(--rci-ink);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.5;
    min-height: 100vh;
    position: relative;
  }

  /* Blank off-white page background — no body-level textures */

  /* DARK MODE */
  body[data-mode="dark"] {
    background: var(--page-bg-dark);
    color: var(--rci-offwhite);
    --rule: #f0e3d8;
    --rule-soft: #4a4138;
    --paper: #221d18;
    --paper-soft: #1a1612;
    --fg: var(--rci-offwhite);
    --fg-soft: #c9c2c2;
  }

  /* Layer the actual content above the texture */
  #root { position: relative; z-index: 1; }

  .site {
    max-width: 1320px;
    margin: 0 auto;
    padding: 0 28px 64px;
  }

  /* ─── MASTHEAD ────────────────────────────────────────────── */
  .masthead {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 22px 0 18px;
    border-bottom: 4px solid var(--rule);
    gap: 24px;
  }
  .mast-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .mast-logo {
    width: 48px; height: 48px;
    display: block;
  }
  .mast-wordmark { display: flex; flex-direction: column; }
  .wm-title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 42px;
    line-height: 0.95;
    letter-spacing: -0.01em;
    text-transform: none;
    color: var(--rci-ink);
  }
  body[data-mode="dark"] .wm-title { color: var(--rci-offwhite); }
  .wm-dot { color: var(--rci-red); }
  .mast-slash {
    font-family: var(--font-display);
    font-size: 36px;
    color: var(--rci-red);
    font-weight: 400;
    line-height: 1;
    margin: 0 4px 4px;
  }
  .mast-tag {
    font-family: var(--font-display);
    text-transform: uppercase;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.02em;
    line-height: 0.98;
    color: var(--rci-ink);
    padding-left: 0;
  }
  body[data-mode="dark"] .mast-tag { color: var(--rci-offwhite); }

  .mast-right { display: flex; align-items: center; gap: 18px; }
  .mast-socials {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .mast-social {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border: 2px solid var(--rule);
    background: var(--paper);
    color: var(--rci-ink);
    text-decoration: none;
    transition: background 90ms, color 90ms, transform 90ms cubic-bezier(0.2,0.7,0.1,1);
  }
  .mast-social svg { width: 18px; height: 18px; display: block; }
  .mast-social:hover {
    background: var(--rci-red);
    color: var(--rci-offwhite);
    border-color: var(--rci-red);
  }
  .mast-social:active { transform: translate(1px, 1px); }
  @media (max-width: 720px) {
    .mast-socials { display: none; }
  }

  .mast-search {
    display: flex; align-items: center;
    height: 44px;
    background: var(--paper);
    border: 2px solid var(--rule);
    transition: border-color 120ms, background 80ms;
    overflow: hidden;
  }
  body[data-mode="dark"] .mast-search { background: var(--paper); }
  .mast-search:focus-within { border-color: var(--rci-ink); }
  .mast-search-input {
    width: 0;
    padding: 0;
    border: 0;
    background: transparent;
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 0.01em;
    color: var(--rci-ink);
    outline: none;
    transition: width 240ms cubic-bezier(0.2,0.7,0.1,1), padding 240ms;
  }
  body[data-mode="dark"] .mast-search-input { color: var(--rci-ink); }
  .mast-search-input::placeholder { color: var(--rci-ink); opacity: 0.55; font-style: italic; }
  .mast-search[data-open="true"] .mast-search-input { width: 200px; padding: 0 4px 0 12px; }
  .mast-search-btn {
    width: 40px; height: 40px;
    flex: 0 0 40px;
    background: transparent;
    border: 0;
    padding: 0;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--rci-ink);
    transition: background 80ms, color 80ms;
  }
  body[data-mode="dark"] .mast-search-btn { color: var(--rci-ink); }
  .mast-search-btn:hover { background: var(--rci-ink); color: var(--rci-offwhite); }
  .mast-search[data-open="true"] .mast-search-btn:hover { background: transparent; color: var(--rci-red); }
  .mast-search-btn svg { width: 18px; height: 18px; display: block; }
  .mast-search-btn:active { transform: translate(1px, 1px); }

  /* ─── NAV ─────────────────────────────────────────────────── */
  .primary-nav {
    padding: 18px 0 22px;
    border-bottom: 1px solid var(--rule-soft);
  }
  .nav-inner {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  body[data-mode="dark"] .pbtn { border-color: var(--rci-offwhite) !important; box-shadow: 3px 3px 0 var(--rci-offwhite) !important; }
  body[data-mode="dark"] .pbtn:active { box-shadow: 0 0 0 var(--rci-offwhite) !important; }

  /* ─── HERO ────────────────────────────────────────────────── */
  .hero { padding: 28px 0 36px; }
  .hero-grid {
    display: grid;
    grid-template-columns: 340px 1fr 240px;
    gap: 32px;
  }
  .hero-left {
    display: flex;
    flex-direction: column;
    gap: 28px;
    border-left: 1px solid var(--rule-soft);
    padding-left: 22px;
  }
  .hero-side-card {
    display: flex;
    flex-direction: column;
    gap: 10px;
    text-decoration: none;
    color: inherit;
  }
  .hero-side-img {
    position: relative;
    width: 100%;
    aspect-ratio: 3/2;
    overflow: hidden;
    border: 2px solid var(--rule);
    box-shadow: 4px 4px 0 var(--rule);
    background: var(--rci-ink);
    transition: transform 90ms cubic-bezier(0.2,0.7,0.1,1), box-shadow 90ms;
  }
  .hero-side-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
  }
  .hero-side-card:hover .hero-side-img {
    transform: translate(-1px, -1px);
    box-shadow: 6px 6px 0 var(--rule);
  }
  .hero-side-meta {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 0 2px;
  }
  .hero-side-byline {
    font-family: var(--font-condensed);
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--rci-ink);
    font-weight: 700;
  }
  .hero-side-card:hover .hero-side-byline { color: var(--rci-red); }

  .hero-center { min-width: 0; }
  .hero-feature { display: flex; flex-direction: column; gap: 18px; }
  .hero-feature-img {
    position: relative;
    width: 100%;
    aspect-ratio: 5/3;
    overflow: hidden;
    border: 2px solid var(--rule);
    box-shadow: 6px 6px 0 var(--rule);
    background: var(--rci-ink);
  }
  .hero-feature-img-bg {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center;
    filter: contrast(1.08) saturate(0.9);
  }
  .hero-feature-img-poster {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
  }
  .hero-feature-img-grain { display: none; }
  .hero-feature-body { display: flex; flex-direction: column; gap: 10px; padding: 0 4px; }
  .hero-h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 54px;
    line-height: 0.92;
    text-transform: uppercase;
    letter-spacing: -0.005em;
    margin: 4px 0 4px;
    color: var(--fg, var(--rci-ink));
    text-wrap: balance;
  }
  .hero-h1--serif {
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 46px;
    line-height: 1.02;
    text-transform: none;
    letter-spacing: -0.01em;
  }
  .hero-byline {
    font-family: var(--font-condensed);
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--rci-ash);
  }
  body[data-mode="dark"] .hero-byline { color: #c9c2c2; }
  .hero-dek {
    font-family: var(--font-serif);
    font-size: 18px;
    line-height: 1.45;
    color: var(--rci-ink-soft);
    margin: 4px 0 8px;
    max-width: 60ch;
  }
  body[data-mode="dark"] .hero-dek { color: #d4cbc1; }
  .hero-dek b { color: var(--fg, var(--rci-ink)); font-weight: 700; }
  .hero-actions { display: flex; gap: 12px; margin-top: 4px; }

  /* Latest analysis sidebar (left column) */
  .hero-right {
    border-right: 1px solid var(--rule-soft);
    padding-right: 22px;
    position: relative;
  }
  .hero-right::before {
    content: "";
    position: absolute;
    right: -1px; top: 0; bottom: 0;
    width: 0;
    border-right: 1px solid var(--rule-soft);
    transform: translateX(3px);
  }
  .popular-head {
    border-bottom: 2px solid var(--rule);
    padding-bottom: 8px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .popular-sub {
    font-family: var(--font-condensed);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--rci-ash);
  }
  .popular-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
  }
  .popular-item {
    display: grid;
    grid-template-columns: 48px 1fr;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px dashed var(--rule-soft);
    align-items: start;
  }
  .popular-item:last-of-type { border-bottom: 0; }
  .popular-text { min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .popular-num {
    font-family: var(--font-condensed);
    font-weight: 700;
    font-size: 13px;
    color: var(--rci-red);
    line-height: 1.1;
    text-align: right;
    padding-right: 8px;
    padding-top: 2px;
    border-right: 1px solid var(--rule-soft);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .popular-title {
    font-family: var(--font-headline);
    font-weight: 700;
    font-size: 15px;
    line-height: 1.2;
    color: var(--fg, var(--rci-ink));
    text-decoration: none;
    letter-spacing: 0.005em;
    text-transform: none;
  }
  .popular-title:hover {
    color: var(--rci-red);
    text-decoration: underline;
    text-decoration-thickness: 2px;
  }
  .popular-foot { padding-top: 14px; }

  /* ─── CAMPAIGN ────────────────────────────────────────────── */
  .campaign { padding: 28px 0 36px; }
  .campaign-card {
    display: grid;
    grid-template-columns: 1.05fr 1fr;
    border: 2px solid var(--rci-ink);
    box-shadow: 6px 6px 0 var(--rci-ink);
    background: var(--paper);
    overflow: hidden;
  }
  .campaign-photo {
    position: relative;
    background: var(--rci-red);
    overflow: hidden;
    min-height: 460px;
  }
  .campaign-photo img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 30%;
    display: block;
  }
  .campaign-stamp {
    position: absolute;
    top: 22px;
    left: 22px;
    z-index: 2;
    padding: 10px 14px 8px;
    background: rgba(0,0,0,0.78);
    border: 2px solid var(--rci-offwhite);
    color: var(--rci-offwhite);
    font-family: var(--font-display);
    line-height: 0.92;
    transform: rotate(-3deg);
    box-shadow: 4px 4px 0 rgba(0,0,0,0.35);
  }
  .campaign-stamp-line {
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    text-align: center;
  }
  .campaign-stamp-line--big {
    font-size: 26px;
    letter-spacing: 0.04em;
    color: var(--rci-red);
    margin-top: 2px;
  }
  .campaign-body {
    padding: 38px 42px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    justify-content: center;
  }
  .campaign-h2 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 44px;
    line-height: 0.94;
    text-transform: uppercase;
    margin: 0;
    color: var(--rci-ink);
    text-wrap: balance;
  }
  .campaign-meta {
    font-family: var(--font-condensed);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--rci-ash);
    border-bottom: 1px solid var(--rule-soft);
    padding-bottom: 12px;
    margin-bottom: 4px;
  }
  .campaign-body-p {
    font-family: var(--font-serif);
    font-size: 15.5px;
    line-height: 1.5;
    color: var(--rci-ink-soft);
    margin: 0;
  }
  .campaign-body-p b { color: var(--rci-ink); font-weight: 700; }
  .campaign-pullquote {
    font-family: var(--font-display);
    font-size: 22px;
    line-height: 1.1;
    color: var(--rci-red);
    margin: 8px 0 6px;
    padding-left: 14px;
    border-left: 4px solid var(--rci-red);
    text-transform: uppercase;
    text-wrap: balance;
  }
  .campaign-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
  @media (max-width: 900px) {
    .campaign-card { grid-template-columns: 1fr; }
    .campaign-photo { min-height: 320px; }
    .campaign-body { padding: 28px 24px; }
    .campaign-h2 { font-size: 34px; }
  }

  /* ─── FOUR-UP ─────────────────────────────────────────────── */
  .four-up { padding: 28px 0; }
  .four-up-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 26px;
  }

  /* ─── JOIN BANNER ─────────────────────────────────────────── */
  .join-banner {
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    margin: 40px 0;
    border: 2px solid var(--rci-ink);
    box-shadow: 6px 6px 0 var(--rci-ink);
    position: relative;
    overflow: hidden;
  }
  .join-left {
    background: var(--rci-ink);
    color: var(--rci-offwhite);
    padding: 44px 44px 44px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
  }
  .join-left::before {
    content: "";
    position: absolute; inset: 0;
    background-image: url("ds/textures/grunge-light-specks.jpg");
    background-size: 700px;
    mix-blend-mode: screen;
    opacity: 0.10;
    pointer-events: none;
  }
  .join-h2 {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: 42px;
    line-height: 0.98;
    text-transform: uppercase;
    margin: 0;
    color: var(--rci-offwhite);
    text-wrap: balance;
    position: relative;
  }
  .join-num {
    color: var(--rci-red);
    font-weight: 700;
    font-size: 1.15em;
  }
  .join-body {
    font-family: var(--font-serif);
    font-size: 16px;
    line-height: 1.5;
    color: #e6dfdf;
    max-width: 50ch;
    margin: 0;
    position: relative;
  }
  .join-actions { display: flex; gap: 14px; margin-top: 12px; position: relative; }

  .join-right {
    position: relative;
    overflow: hidden;
    min-height: 380px;
  }
  .join-photo {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center;
    filter: contrast(1.1) saturate(0.95);
  }
  .join-photo-grain {
    position: absolute; inset: 0;
    background-image: url("ds/textures/film-grain.jpg");
    background-size: 500px;
    mix-blend-mode: multiply;
    opacity: 0.18;
    pointer-events: none;
  }
  .join-stamp {
    position: absolute;
    bottom: 28px; right: 28px;
    border: 3px solid var(--rci-red);
    padding: 14px 18px 10px;
    background: rgba(246, 239, 239, 0.92);
    transform: rotate(-4deg);
    font-family: var(--font-display);
    color: var(--rci-red);
    line-height: 0.95;
    text-align: center;
    font-size: 18px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    box-shadow: 4px 4px 0 rgba(0,0,0,0.18);
  }
  .join-stamp-line { white-space: nowrap; }

  /* ─── IDOM (In Defence of Marxism) — magazine TOC ─────────── */
  .idom {
    margin: 50px 0;
    display: grid;
    grid-template-columns: 360px 1fr;
    border: 2px solid var(--rule);
    box-shadow: 6px 6px 0 var(--rule);
    background: var(--paper);
    position: relative;
  }
  .idom-cover {
    background: var(--rci-ink);
    color: var(--rci-offwhite);
    padding: 26px 28px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    align-items: stretch;
    position: relative;
    border-right: 2px solid var(--rule);
  }
  .idom-cover-issue-tag {
    font-family: var(--font-condensed);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--rci-red-hot, #ff5a3c);
    border-bottom: 1px solid rgba(255,255,255,0.18);
    padding-bottom: 10px;
  }
  .idom-cover-art {
    width: 100%;
    aspect-ratio: 320 / 470;
    background: #2a2422;
    border: 1px solid rgba(0,0,0,0.4);
    box-shadow: 6px 6px 0 rgba(0,0,0,0.35);
    overflow: hidden;
    position: relative;
    z-index: 5;
    isolation: isolate;
  }
  .idom-cover-art img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    position: relative;
    z-index: 2;
    filter: none;
    mix-blend-mode: normal;
  }
  .idom-cover-meta {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: flex-start;
  }
  .idom-cover-issuenum {
    font-family: var(--font-condensed);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--rci-offwhite);
  }

  .idom-toc {
    padding: 28px 36px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .idom-toc-head {
    border-bottom: 4px solid var(--rule);
    padding-bottom: 12px;
    margin-bottom: 6px;
  }
  .idom-toc-eyebrow {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 22px;
    line-height: 1;
    color: var(--rci-ink);
  }
  .idom-toc-wordmark {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 62px;
    line-height: 0.9;
    letter-spacing: -0.005em;
    color: var(--rci-ink);
    margin-top: 4px;
  }
  .idom-toc-tagline {
    font-family: var(--font-condensed);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--rci-red);
    margin-top: 8px;
  }
  .idom-toc-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
  }
  .idom-toc-item {
    display: grid;
    grid-template-columns: 48px 1fr;
    gap: 16px;
    padding: 14px 0;
    border-bottom: 1px dashed var(--rule-soft);
    align-items: start;
  }
  .idom-toc-item:last-child { border-bottom: 0; }
  .idom-toc-num {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 28px;
    color: var(--rci-red);
    line-height: 1;
    text-align: right;
    padding-right: 10px;
    padding-top: 2px;
    border-right: 1px solid var(--rule-soft);
  }
  .idom-toc-text { display: flex; flex-direction: column; gap: 4px; }
  .idom-toc-title {
    font-family: var(--font-headline);
    font-weight: 700;
    font-size: 19px;
    line-height: 1.1;
    color: var(--rci-ink);
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.005em;
  }
  .idom-toc-title--serif {
    font-family: var(--font-serif);
    font-weight: 700;
    text-transform: none;
    font-size: 21px;
    line-height: 1.15;
    letter-spacing: -0.005em;
  }
  .idom-toc-title:hover { color: var(--rci-red); }
  .idom-toc-item--featured .idom-toc-title { font-size: 24px; }
  .idom-toc-item--featured .idom-toc-num { font-size: 36px; }
  .idom-toc-foot {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    padding-top: 14px;
    border-top: 4px solid var(--rule);
  }

  @media (max-width: 900px) {
    .idom { grid-template-columns: 1fr; }
    .idom-cover { border-right: 0; border-bottom: 2px solid var(--rule); }
    .idom-toc { padding: 24px 22px; }
    .idom-toc-wordmark { font-size: 52px; }
  }

  /* ─── IDOM legacy (unused after redesign, kept for safety) ── */
  .idom {
    margin: 50px 0;
    display: grid;
    grid-template-columns: 280px 1fr;
    border: 2px solid var(--rule);
    box-shadow: 6px 6px 0 var(--rule);
    background: var(--paper);
    position: relative;
  }
  .idom-cover {
    background: var(--paper-soft);
    border-right: 2px solid var(--rule);
    padding: 30px 24px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 24px;
    position: relative;
  }
  .idom-cover::before {
    content: "";
    position: absolute; inset: 0;
    background-image: url("ds/textures/paper-274.jpg");
    background-size: cover;
    mix-blend-mode: multiply;
    opacity: 0.5;
    pointer-events: none;
  }
  .idom-cover-stack { position: relative; }
  .idom-cover-eyebrow {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 22px;
    line-height: 1;
    color: var(--rci-ink);
    margin-bottom: 8px;
    display: block;
  }
  .idom-cover-title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 56px;
    line-height: 0.9;
    color: var(--rci-ink);
    margin: 0;
    letter-spacing: -0.005em;
    white-space: nowrap;
  }
  .idom-cover-issue {
    font-family: var(--font-condensed);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--rci-red);
    margin-top: 16px;
    border-top: 2px solid var(--rci-ink);
    padding-top: 10px;
  }
  .idom-cover-foot { position: relative; }

  .idom-articles {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    padding: 22px 0;
  }
  .idom-article {
    padding: 8px 22px;
    border-right: 1px solid var(--rule-soft);
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: relative;
  }
  .idom-article:last-child { border-right: 0; }
  .idom-photo {
    width: 100%;
    aspect-ratio: 4/3;
    background-size: cover;
    background-position: center;
    border: 1.5px solid var(--rule);
    position: relative;
    filter: contrast(1.05);
  }
  .idom-photo-grain {
    position: absolute; top: 0; left: 22px; right: 22px;
    aspect-ratio: 4/3;
    background-image: url("ds/textures/film-grain.jpg");
    background-size: 400px;
    mix-blend-mode: multiply;
    opacity: 0.14;
    pointer-events: none;
  }
  .idom-article-body { display: flex; flex-direction: column; gap: 6px; }
  .idom-title {
    font-family: var(--font-headline);
    font-weight: 700;
    font-size: 20px;
    line-height: 1.05;
    text-transform: uppercase;
    margin: 0;
    color: var(--fg, var(--rci-ink));
    letter-spacing: 0.005em;
  }
  .idom-title--serif {
    font-family: var(--font-serif);
    font-weight: 700;
    text-transform: none;
    font-size: 21px;
    line-height: 1.15;
    letter-spacing: -0.005em;
  }
  .idom-pull {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 14px;
    line-height: 1.4;
    color: var(--rci-ink-soft);
    margin: 0;
  }
  body[data-mode="dark"] .idom-pull { color: #c9c2c2; }

  /* ─── TOPIC SPLIT ─────────────────────────────────────────── */
  .topic-split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    margin: 50px 0;
    border-top: 4px solid var(--rule);
    border-bottom: 4px solid var(--rule);
    padding: 22px 0;
  }
  .topic-col {
    padding: 0 28px;
    border-right: 1px solid var(--rule-soft);
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .topic-col:last-child { border-right: 0; }
  .topic-col:first-child { padding-left: 0; }
  .topic-col:last-child { padding-right: 0; }
  .topic-col-head { margin-bottom: 4px; }

  .topic-row {
    display: grid;
    grid-template-columns: 1fr 140px;
    gap: 18px;
    text-decoration: none;
    padding: 16px 0;
    border-bottom: 1px dashed var(--rule-soft);
    color: inherit;
    align-items: start;
  }
  .topic-row:last-of-type { border-bottom: 0; }
  .topic-row-text { display: flex; flex-direction: column; gap: 6px; padding-top: 2px; }
  .topic-title {
    font-family: var(--font-headline);
    font-weight: 700;
    font-size: 21px;
    line-height: 1.08;
    text-transform: uppercase;
    margin: 0;
    color: var(--fg, var(--rci-ink));
    letter-spacing: 0.005em;
  }
  .topic-title--serif {
    font-family: var(--font-serif);
    font-weight: 700;
    text-transform: none;
    font-size: 22px;
    line-height: 1.15;
    letter-spacing: -0.005em;
  }
  .topic-row:hover .topic-title { color: var(--rci-red); }
  .topic-byline {
    font-family: var(--font-condensed);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--rci-ash);
  }
  .topic-row-img {
    aspect-ratio: 4/3;
    background-size: cover;
    background-position: center;
    border: 1.5px solid var(--rule);
    box-shadow: 3px 3px 0 var(--rule);
    position: relative;
    filter: contrast(1.05);
  }
  .topic-row-img-grain {
    position: absolute; inset: 0;
    background-image: url("ds/textures/film-grain.jpg");
    background-size: 300px;
    mix-blend-mode: multiply;
    opacity: 0.14;
    pointer-events: none;
  }
  .topic-col-foot { padding-top: 6px; }
  .topic-more {
    font-family: var(--font-condensed);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--rci-red);
    text-decoration: none;
    border-bottom: 2px solid var(--rci-red);
    padding-bottom: 1px;
    align-self: flex-start;
  }
  .topic-more:hover { color: var(--rci-red-dark); border-color: var(--rci-red-dark); }

  /* ─── NATIONAL SECTIONS ───────────────────────────────────── */
  .sections-card {
    margin: 40px 0;
    border: 2px solid var(--rci-ink);
    box-shadow: 6px 6px 0 var(--rci-ink);
    background: var(--paper);
    overflow: hidden;
  }
  .sections-photo {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 7;
    overflow: hidden;
    border-bottom: 2px solid var(--rci-ink);
    background: var(--rci-ink);
  }
  .sections-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 35%;
    display: block;
  }
  .sections-photo-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    gap: 6px;
    padding: 28px 36px 24px;
    color: var(--rci-offwhite);
    background: linear-gradient(180deg, rgba(0,0,0,0) 35%, rgba(0,0,0,0.7) 100%);
  }
  .sections-h2 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 46px;
    line-height: 0.95;
    text-transform: uppercase;
    margin: 0;
    color: var(--rci-offwhite);
    text-wrap: balance;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.45);
  }
  .sections-meta {
    font-family: var(--font-condensed);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
    margin-top: 6px;
  }

  .sections-list {
    list-style: none;
    padding: 4px 36px;
    margin: 0;
  }
  .sections-item {
    display: grid;
    grid-template-columns: 56px 1fr 32px;
    gap: 18px;
    padding: 22px 0;
    border-bottom: 1px dashed var(--rule-soft);
    align-items: center;
    text-decoration: none;
    color: inherit;
  }
  .sections-item:last-child { border-bottom: 0; }
  .sections-num {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 36px;
    color: var(--rci-red);
    line-height: 1;
    text-align: right;
    padding-right: 12px;
    border-right: 1px solid var(--rule-soft);
  }
  .sections-text { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .sections-title {
    font-family: var(--font-headline);
    font-weight: 700;
    font-size: 22px;
    line-height: 1.1;
    color: var(--rci-ink);
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.005em;
  }
  .sections-title--serif {
    font-family: var(--font-serif);
    font-weight: 700;
    text-transform: none;
    font-size: 23px;
    line-height: 1.18;
    letter-spacing: -0.005em;
  }
  .sections-item:hover .sections-title { color: var(--rci-red); }
  .sections-arrow {
    font-family: var(--font-display);
    font-size: 28px;
    color: var(--rci-ink);
    text-align: center;
    transition: transform 90ms cubic-bezier(0.2,0.7,0.1,1), color 90ms;
  }
  .sections-item:hover .sections-arrow { color: var(--rci-red); transform: translateX(4px); }
  .sections-foot {
    display: flex;
    gap: 10px;
    padding: 18px 36px 24px;
    border-top: 4px solid var(--rci-ink);
    flex-wrap: wrap;
  }
  @media (max-width: 900px) {
    .sections-photo { aspect-ratio: 4 / 3; }
    .sections-h2 { font-size: 30px; }
    .sections-list { padding: 4px 22px; }
    .sections-foot { padding: 18px 22px 22px; }
    .sections-item { grid-template-columns: 44px 1fr 24px; gap: 12px; }
    .sections-num { font-size: 28px; padding-right: 8px; }
    .sections-title { font-size: 18px; }
  }

  /* ─── MANIFESTO ───────────────────────────────────────────── */
  .manifesto {
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    margin: 40px 0;
    border: 2px solid var(--rci-ink);
    box-shadow: 6px 6px 0 var(--rci-ink);
    overflow: hidden;
    min-height: 320px;
  }
  .manifesto-photo {
    position: relative;
    background: var(--rci-ink);
    background-image:
      linear-gradient(135deg, rgba(40,30,30,0.4), rgba(0,0,0,0.6)),
      url("ds/textures/grunge-light-specks.jpg");
    background-size: cover;
    background-blend-mode: multiply, normal;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px;
    min-height: 320px;
  }
  .manifesto-photo-grain {
    position: absolute; inset: 0;
    background-image: url("ds/textures/film-grain.jpg");
    background-size: 500px;
    mix-blend-mode: multiply;
    opacity: 0.22;
    pointer-events: none;
  }
  .manifesto-flag {
    position: relative;
    width: 78%;
    max-width: 460px;
    height: auto;
    transform: rotate(-2deg);
    box-shadow: 8px 8px 0 rgba(0,0,0,0.4);
    border: 1px solid rgba(0,0,0,0.35);
    z-index: 1;
  }
  .manifesto-stamp {
    position: absolute;
    top: 20px;
    right: 22px;
    padding: 7px 12px 5px;
    border: 2px solid var(--rci-offwhite);
    color: var(--rci-offwhite);
    font-family: var(--font-condensed);
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.22em;
    transform: rotate(4deg);
    background: rgba(0,0,0,0.4);
    z-index: 2;
  }
  .manifesto-panel {
    background: var(--rci-red);
    color: var(--rci-offwhite);
    padding: 42px 44px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    justify-content: center;
    position: relative;
  }
  .manifesto-panel::before {
    content: "";
    position: absolute; inset: 0;
    background-image: url("ds/textures/red-paper-alt.jpg");
    background-size: cover;
    mix-blend-mode: multiply;
    opacity: 0.35;
    pointer-events: none;
  }
  .manifesto-h2 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 40px;
    line-height: 0.95;
    text-transform: uppercase;
    margin: 0;
    text-wrap: balance;
    position: relative;
  }
  .manifesto-body {
    font-family: var(--font-serif);
    font-size: 16px;
    line-height: 1.5;
    margin: 0;
    max-width: 48ch;
    position: relative;
  }
  .manifesto-actions { margin-top: 12px; position: relative; }

  /* ─── FOOTER ─────────────────────────────────────────────── */
  .site-foot {
    margin-top: 60px;
    padding: 36px 0 24px;
    border-top: 8px solid var(--rule);
    position: relative;
  }
  .foot-top {
    display: grid;
    grid-template-columns: 1.2fr 2fr;
    gap: 40px;
  }
  .foot-brand { display: flex; gap: 16px; align-items: flex-start; }
  .foot-brand img { width: 56px; height: 56px; }
  .foot-brand-wm {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 28px;
    color: var(--fg, var(--rci-ink));
    line-height: 1;
  }
  .foot-brand-tag {
    font-family: var(--font-condensed);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--rci-ash);
    margin-top: 6px;
  }
  .foot-cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
  .foot-col { display: flex; flex-direction: column; gap: 8px; }
  .foot-col-h {
    font-family: var(--font-condensed);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--rci-red);
    margin-bottom: 4px;
    border-bottom: 2px solid var(--rci-ink);
    padding-bottom: 6px;
  }
  body[data-mode="dark"] .foot-col-h { border-bottom-color: var(--rci-offwhite); }
  .foot-col a {
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--fg, var(--rci-ink));
    text-decoration: none;
  }
  body[data-mode="dark"] .foot-col a { color: #d4cbc1; }
  .foot-col a:hover { color: var(--rci-red); text-decoration: underline; }
  .foot-rule {
    height: 0;
    border-top: 1px solid var(--rule);
    margin: 32px 0 18px;
  }
  .foot-bot {
    display: flex;
    justify-content: space-between;
    font-family: var(--font-condensed);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--rci-ash);
  }

  /* Hover behavior on hero feature image (subtle press feeling) */
  .hero-feature-img { transition: transform 90ms cubic-bezier(0.2,0.7,0.1,1), box-shadow 90ms; }
  .hero-feature-img:hover { transform: translate(-1px, -1px); box-shadow: 8px 8px 0 var(--rule); }

  /* Responsive (down to ~900px) */
  @media (max-width: 1100px) {
    .hero-grid { grid-template-columns: 260px 1fr 200px; gap: 24px; }
    .four-up-grid { gap: 20px; }
    .hero-h1 { font-size: 44px; }
    .hero-h1--serif { font-size: 38px; }
  }
  @media (max-width: 900px) {
    .site { padding: 0 20px 48px; }
    .hero-grid { grid-template-columns: 1fr; }
    .four-up-grid { grid-template-columns: repeat(2, 1fr); }
    .idom { grid-template-columns: 1fr; }
    .idom-cover { border-right: 0; border-bottom: 2px solid var(--rule); }
    .idom-articles { grid-template-columns: 1fr; }
    .idom-article { border-right: 0; border-bottom: 1px solid var(--rule-soft); padding: 16px 22px; }
    .idom-article:last-child { border-bottom: 0; }
    .join-banner, .manifesto { grid-template-columns: 1fr; }
    .topic-split { grid-template-columns: 1fr; gap: 16px; }

  @media (max-width: 560px) {

    .wm-title { font-size: 32px; }
    .hero-h1 { font-size: 36px; }
  }
</style>
