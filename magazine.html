<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1280">
<title>In Defence of Marxism — Marxist.com</title>

<link rel="stylesheet" href="ds/colors_and_type.css">

<style>
  /* ────────────────────────────────────────────────────────────
     Marxist.com — Podcasts & Media page styling
     Print-materiality visual language:
       • paper substrate + film grain
       • ink rules, hard 2.5D offset shadows, zero-radius corners
       • Built Titling display, Cheltenham serif body, Trade Gothic eyebrows
     ──────────────────────────────────────────────────────────── */

  :root {
    --page-bg: #f6efef;
    --page-bg-dark: #181513;
    --paper: #f6efef;
    --paper-soft: #ece4e4;
    --rule: var(--rci-ink);
    --rule-soft: #b8b0ac;
  }

  html, body { margin: 0; padding: 0; }
  html { background: var(--page-bg); }
  body {
    background: var(--page-bg);
    color: var(--rci-ink);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.5;
    min-height: 100vh;
    position: relative;
  }

  /* DARK MODE */
  [data-mode="dark"] {
    background: var(--page-bg-dark);
    color: var(--rci-offwhite);
    --rule: #f0e3d8;
    --rule-soft: #4a4138;
    --paper: #221d18;
    --paper-soft: #1a1612;
    --fg: var(--rci-offwhite);
    --fg-soft: #c9c2c2;
  }

  #root { position: relative; z-index: 1; }

  .site {
    max-width: 1320px;
    margin: 0 auto;
    padding: 0 28px 64px;
  }

  /* ─── MASTHEAD ────────────────────────────────────────────── */
  .masthead {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 22px 0 18px;
    border-bottom: 4px solid var(--rule);
    gap: 24px;
  }
  .mast-left {
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    color: inherit;
  }
  .mast-logo {
    width: 48px; height: 48px;
    display: block;
  }
  .mast-wordmark { display: flex; flex-direction: column; }
  .wm-title {
    font-family: var(--font-article-title);
    font-weight: 700;
    font-size: 42px;
    line-height: 0.95;
    letter-spacing: -0.01em;
    text-transform: none;
    color: var(--rci-ink);
  }
  [data-mode="dark"] .wm-title { color: var(--rci-offwhite); }
  .wm-dot { color: var(--rci-red); }
  .mast-slash {
    font-family: var(--font-display);
    font-size: 36px;
    color: var(--rci-red);
    font-weight: 400;
    line-height: 1;
    margin: 0 4px 4px;
  }
  .mast-tag {
    font-family: var(--font-article-title);
    text-transform: uppercase;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.02em;
    line-height: 0.98;
    color: var(--rci-ink);
  }
  [data-mode="dark"] .mast-tag { color: var(--rci-offwhite); }

  .mast-right { display: flex; align-items: center; gap: 18px; }
  .mast-socials {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .mast-social {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border: 2px solid var(--rule);
    background: var(--paper);
    color: var(--rci-ink);
    text-decoration: none;
    transition: background 90ms, color 90ms, transform 90ms cubic-bezier(0.2,0.7,0.1,1);
  }
  .mast-social svg { width: 18px; height: 18px; display: block; }
  .mast-social:hover {
    background: var(--rci-red);
    color: var(--rci-offwhite);
    border-color: var(--rci-red);
  }
  .mast-social:active { transform: translate(1px, 1px); }
  @media (max-width: 720px) {
    .mast-socials { display: none; }
  }

  .mast-search {
    display: flex; align-items: center;
    height: 44px;
    background: var(--paper);
    border: 2px solid var(--rule);
    transition: border-color 120ms, background 80ms;
    overflow: hidden;
  }
  [data-mode="dark"] .mast-search { background: var(--paper); }
  .mast-search:focus-within { border-color: var(--rci-ink); }
  .mast-search-input {
    width: 0;
    padding: 0;
    border: 0;
    background: transparent;
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 0.01em;
    color: var(--rci-ink);
    outline: none;
    transition: width 240ms cubic-bezier(0.2,0.7,0.1,1), padding 240ms;
  }
  [data-mode="dark"] .mast-search-input { color: var(--rci-ink); }
  .mast-search-input::placeholder { color: var(--rci-ink); opacity: 0.55; font-style: italic; }
  .mast-search[data-open="true"] .mast-search-input { width: 200px; padding: 0 4px 0 12px; }
  .mast-search-btn {
    width: 40px; height: 40px;
    flex: 0 0 40px;
    background: transparent;
    border: 0;
    padding: 0;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--rci-ink);
    transition: background 80ms, color 80ms;
  }
  [data-mode="dark"] .mast-search-btn { color: var(--rci-ink); }
  .mast-search-btn:hover { background: var(--rci-ink); color: var(--rci-offwhite); }
  .mast-search[data-open="true"] .mast-search-btn:hover { background: transparent; color: var(--rci-red); }
  .mast-search-btn svg { width: 18px; height: 18px; display: block; }
  .mast-search-btn:active { transform: translate(1px, 1px); }

  /* ─── NAV ─────────────────────────────────────────────────── */
  .primary-nav {
    padding: 18px 0 22px;
    border-bottom: 1px solid var(--rule-soft);
  }
  .nav-inner {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  [data-mode="dark"] .pbtn { border-color: var(--rci-offwhite) !important; box-shadow: 3px 3px 0 var(--rci-offwhite) !important; }
  [data-mode="dark"] .pbtn:active { box-shadow: 0 0 0 var(--rci-offwhite) !important; }

  /* ─── PODCASTS SECTION ────────────────────────────────────── */
  .podcasts-section {
    padding: 28px 0 36px;
  }
  .podcasts-grid {
    display: grid;
    grid-template-columns: 460px 1fr;
    gap: 32px;
    align-items: start;
    margin-top: 18px;
  }
  .podcasts-left {
    display: flex;
    flex-direction: column;
    gap: 28px;
  }
  
  /* Podcast card (2.5D hard offset) */
  .podcast-card {
    border: 2px solid var(--rule);
    box-shadow: 6px 6px 0 var(--rule);
    background: var(--paper);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 24px;
    gap: 18px;
  }
  .podcast-card-header {
    display: flex;
    gap: 16px;
  }
  .podcast-cover-wrap {
    width: 110px;
    height: 110px;
    flex-shrink: 0;
    border: 2px solid var(--rule);
    position: relative;
    background: var(--rci-ink);
  }
  .podcast-cover {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .podcast-info {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-width: 0;
  }
  .podcast-title {
    font-family: var(--font-article-title);
    font-weight: 800;
    font-size: 22px;
    line-height: 1.1;
    margin: 0 0 4px;
    text-transform: uppercase;
  }
  .podcast-desc {
    font-family: var(--font-serif);
    font-size: 14px;
    line-height: 1.4;
    color: var(--rci-ink-soft);
    margin: 0;
  }
  [data-mode="dark"] .podcast-desc { color: #d4cbc1; }
  
  /* Listen links & badges */
  .podcast-links {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .listen-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-condensed);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    border: 1.5px solid var(--rule);
    padding: 5px 10px;
    background: var(--paper);
    color: var(--rci-ink);
    transition: background 80ms, color 80ms, transform 80ms;
  }
  .listen-badge:hover {
    background: var(--rci-ink);
    color: var(--rci-offwhite);
  }
  .listen-badge:active {
    transform: translate(1px, 1px);
  }
  .listen-badge svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
  }
  [data-mode="dark"] .listen-badge {
    border-color: var(--rci-offwhite);
    color: var(--rci-offwhite);
    background: transparent;
  }
  [data-mode="dark"] .listen-badge:hover {
    background: var(--rci-offwhite);
    color: var(--rci-ink);
  }

  /* Embedded Player */
  .embed-container {
    width: 100%;
    height: 152px;
    border: 2px solid var(--rule);
    background: var(--rci-ink);
    position: relative;
    overflow: hidden;
  }
  .embed-container iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }

  /* Episode list column */
  .episode-feed {
    border-left: 1px solid var(--rule-soft);
    padding-left: 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .feed-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid var(--rule);
    padding-bottom: 12px;
  }
  .feed-filter-btn {
    display: flex;
    gap: 8px;
  }
  .episode-list {
    display: flex;
    flex-direction: column;
  }
  .episode-row {
    display: grid;
    grid-template-columns: 100px 1fr 90px;
    gap: 16px;
    padding: 16px 0;
    border-bottom: 1px dashed var(--rule-soft);
    text-decoration: none;
    color: inherit;
    align-items: start;
    transition: background 90ms;
  }
  .episode-row:hover {
    background: rgba(218, 13, 16, 0.03);
  }
  [data-mode="dark"] .episode-row:hover {
    background: rgba(255, 255, 255, 0.03);
  }
  .episode-row:last-child {
    border-bottom: 0;
  }
  .episode-row-date {
    font-family: var(--font-condensed);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--rci-ash);
    padding-top: 4px;
  }
  .episode-row-content {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .episode-row-kicker {
    font-family: var(--font-condensed);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--rci-red);
  }
  .episode-row-title {
    font-family: var(--font-article-title);
    font-weight: 700;
    font-size: 18px;
    line-height: 1.15;
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 0.005em;
  }
  .episode-row-title--serif {
    font-family: var(--font-article-title);
    text-transform: none;
    font-size: 19px;
    letter-spacing: -0.005em;
  }
  .episode-row:hover .episode-row-title {
    color: var(--rci-red);
    text-decoration: underline;
    text-decoration-thickness: 2px;
  }
  .episode-row-desc {
    font-family: var(--font-serif);
    font-size: 14px;
    line-height: 1.4;
    color: var(--rci-ink-soft);
    margin: 4px 0 0;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  [data-mode="dark"] .episode-row-desc { color: #d4cbc1; }
  .episode-row-duration {
    font-family: var(--font-condensed);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--rci-ash);
    text-align: right;
    padding-top: 4px;
  }

  /* ─── YOUTUBE VIDEOS SECTION ──────────────────────────────── */
  .videos-section {
    padding: 36px 0 28px;
    border-top: 8px solid var(--rule);
  }
  .videos-grid {
    display: grid;
    grid-template-columns: 1.25fr 1fr;
    gap: 32px;
    margin-top: 18px;
  }
  
  .video-featured {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .video-list {
    display: flex;
    flex-direction: column;
    gap: 24px;
    border-left: 1px solid var(--rule-soft);
    padding-left: 32px;
  }
  
  .video-player-wrap {
    width: 100%;
    aspect-ratio: 16 / 9;
    border: 2px solid var(--rule);
    box-shadow: 6px 6px 0 var(--rule);
    background: var(--rci-ink);
    position: relative;
    overflow: hidden;
    transition: transform 90ms, box-shadow 90ms;
  }
  .video-player-wrap:hover {
    transform: translate(-1px, -1px);
    box-shadow: 8px 8px 0 var(--rule);
  }
  .video-player-wrap iframe {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    border: 0;
  }
  
  .video-card-small {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 16px;
    align-items: start;
  }
  .video-card-small .video-player-wrap {
    box-shadow: 4px 4px 0 var(--rule);
  }
  .video-card-small .video-player-wrap:hover {
    box-shadow: 6px 6px 0 var(--rule);
  }

  .video-meta {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .video-title {
    font-family: var(--font-article-title);
    font-weight: 800;
    font-size: 26px;
    line-height: 1.05;
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 0.005em;
  }
  .video-title--small {
    font-size: 17px;
    line-height: 1.15;
  }
  .video-desc {
    font-family: var(--font-serif);
    font-size: 15px;
    line-height: 1.45;
    color: var(--rci-ink-soft);
    margin: 0;
  }
  .video-desc--small {
    font-size: 13.5px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  [data-mode="dark"] .video-desc { color: #d4cbc1; }

  /* ─── FOOTER ─────────────────────────────────────────────── */
  .site-foot {
    margin-top: 60px;
    padding: 36px 0 24px;
    border-top: 8px solid var(--rule);
    position: relative;
  }
  .foot-top {
    display: grid;
    grid-template-columns: 1.2fr 2fr;
    gap: 40px;
  }
  .foot-brand { display: flex; gap: 16px; align-items: flex-start; }
  .foot-brand img { width: 56px; height: 56px; }
  .foot-brand-wm {
    font-family: var(--font-article-title);
    font-weight: 700;
    font-size: 28px;
    color: var(--fg, var(--rci-ink));
    line-height: 1;
  }
  .foot-brand-tag {
    font-family: var(--font-article-title);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--rci-ash);
    margin-top: 6px;
  }
  .foot-cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
  .foot-col { display: flex; flex-direction: column; gap: 8px; }
  .foot-col-h {
    font-family: var(--font-condensed);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--rci-red);
    margin-bottom: 4px;
    border-bottom: 2px solid var(--rci-ink);
    padding-bottom: 6px;
  }
  [data-mode="dark"] .foot-col-h { border-bottom-color: var(--rci-offwhite); }
  .foot-col a {
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--fg, var(--rci-ink));
    text-decoration: none;
  }
  [data-mode="dark"] .foot-col a { color: #d4cbc1; }
  .foot-col a:hover { color: var(--rci-red); text-decoration: underline; }
  .foot-rule {
    height: 0;
    border-top: 1px solid var(--rule);
    margin: 32px 0 18px;
  }
  .foot-bot {
    display: flex;
    justify-content: space-between;
    font-family: var(--font-condensed);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--rci-ash);
  }

  /* ─── RESPONSIVE ──────────────────────────────────────────── */
  @media (max-width: 1100px) {
    .podcasts-grid { grid-template-columns: 1fr; }
    .episode-feed { border-left: 0; padding-left: 0; margin-top: 18px; border-top: 1px solid var(--rule-soft); padding-top: 24px; }
    .videos-grid { grid-template-columns: 1fr; }
    .video-list { border-left: 0; padding-left: 0; border-top: 1px solid var(--rule-soft); padding-top: 24px; }
  }
  @media (max-width: 900px) {
    .foot-top { grid-template-columns: 1fr; }
  }
  @media (max-width: 720px) {
    .episode-row { grid-template-columns: 1fr 90px; }
    .episode-row-date { display: none; }
    .video-card-small { grid-template-columns: 1fr; }
  }
  @media (max-width: 560px) {
    .foot-cols { grid-template-columns: 1fr; }
  }

  /* Hamburger Menu Button */
  .mast-hamburger {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    border: 2px solid var(--rule);
    background: var(--paper);
    color: var(--rci-ink);
    cursor: pointer;
    transition: background 90ms, color 90ms, transform 90ms cubic-bezier(0.2,0.7,0.1,1);
    padding: 0;
    flex-shrink: 0;
  }
  [data-mode="dark"] .mast-hamburger { background: var(--paper); color: var(--rci-offwhite); }
  .mast-hamburger:hover {
    background: var(--rci-ink);
    color: var(--rci-offwhite);
  }
  [data-mode="dark"] .mast-hamburger:hover {
    background: var(--rci-offwhite);
    color: var(--rci-ink);
  }
  .mast-hamburger:active {
    transform: translate(1px, 1px);
  }
  .mast-hamburger svg {
    width: 22px;
    height: 22px;
    display: block;
  }

  /* Drawer Overlay backdrop blur */
  .menu-drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.72);
    z-index: 2000;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    overflow-y: auto;
    animation: fadeInDrawerOverlay 0.25s cubic-bezier(0.2, 0.7, 0.1, 1) forwards;
  }
  @keyframes fadeInDrawerOverlay {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Drawer Container */
  .menu-drawer {
    width: 100%;
    min-height: auto;
    background: var(--paper);
    border-bottom: 4px solid var(--rule);
    box-shadow: 0 10px 35px rgba(0, 0, 0, 0.15);
    display: flex;
    flex-direction: column;
    padding: 0;
    box-sizing: border-box;
    transform: translateY(-20px);
    opacity: 0;
    animation: slideDownDrawer 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    position: relative;
    z-index: 2001;
  }
  [data-mode="dark"] .menu-drawer { background: var(--paper); }
  @keyframes slideDownDrawer {
    to { transform: translateY(0); opacity: 1; }
  }

  /* Inner Wrapper to Center Content */
  .menu-drawer-inner {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 24px 44px;
    display: flex;
    flex-direction: column;
    gap: 32px;
    box-sizing: border-box;
  }

  /* Drawer Header */
  .menu-drawer-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid var(--rule);
    padding-bottom: 16px;
  }
  .menu-drawer-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .menu-drawer-brand img {
    width: 32px;
    height: 32px;
    display: block;
  }
  .menu-drawer-wm {
    font-family: var(--font-article-title);
    font-weight: 700;
    font-size: 24px;
    letter-spacing: -0.01em;
    color: var(--rci-ink);
  }
  [data-mode="dark"] .menu-drawer-wm { color: var(--rci-offwhite); }
  
  .menu-drawer-close {
    width: 36px;
    height: 36px;
    border: 2px solid var(--rule);
    background: transparent;
    color: var(--rci-ink);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 90ms, color 90ms, transform 90ms cubic-bezier(0.2,0.7,0.1,1);
    padding: 0;
  }
  [data-mode="dark"] .menu-drawer-close { color: var(--rci-offwhite); }
  .menu-drawer-close:hover {
    background: var(--rci-ink);
    color: var(--rci-offwhite);
  }
  [data-mode="dark"] .menu-drawer-close:hover {
    background: var(--rci-offwhite);
    color: var(--rci-ink);
  }
  .menu-drawer-close:active {
    transform: translate(1px, 1px);
  }
  .menu-drawer-close svg {
    width: 18px;
    height: 18px;
    display: block;
  }

  /* Drawer Layout (Sidebar + Categories) */
  .menu-drawer-layout {
    display: flex;
    gap: 48px;
    width: 100%;
  }
  .menu-drawer-sidebar {
    width: 300px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
    border-right: 2px solid var(--rule-soft);
    padding-right: 32px;
  }
  .menu-drawer-categories {
    flex-grow: 1;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 32px 40px;
  }

  /* Sidebar items (Economist left icons) */
  .drawer-sidebar-item {
    display: flex;
    gap: 16px;
    text-decoration: none;
    color: var(--rci-ink);
    padding: 12px 14px;
    border: 2px solid transparent;
    transition: all 120ms;
    align-items: flex-start;
  }
  [data-mode="dark"] .drawer-sidebar-item { color: var(--rci-offwhite); }
  .drawer-sidebar-item:hover {
    background: var(--paper-soft);
    border-color: var(--rule-soft);
    transform: translate(2px, -2px);
    box-shadow: -3px 3px 0 var(--rci-ink);
  }
  [data-mode="dark"] .drawer-sidebar-item:hover { box-shadow: -3px 3px 0 var(--rci-offwhite); }
  .drawer-sidebar-item svg {
    width: 28px;
    height: 28px;
    fill: none;
    stroke: currentColor;
    stroke-width: 1.75;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .drawer-sidebar-item-content {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .drawer-sidebar-item-title {
    font-family: var(--font-article-title);
    font-size: 16px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: -0.01em;
  }
  .drawer-sidebar-item-desc {
    font-family: var(--font-serif);
    font-size: 12.5px;
    color: var(--rci-ash);
    line-height: 1.35;
  }

  /* Category Grid Links */
  .drawer-category {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .drawer-category-title {
    font-family: var(--font-condensed);
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--rci-red);
    border-bottom: 1.5px solid var(--rci-red);
    padding-bottom: 4px;
    margin-bottom: 4px;
  }
  .drawer-category-links {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .drawer-category-link {
    font-family: var(--font-article-title);
    font-size: 15px;
    font-weight: 700;
    text-decoration: none;
    color: var(--rci-ink);
    transition: color 90ms, padding-left 90ms;
    display: inline-flex;
    align-items: center;
  }
  [data-mode="dark"] .drawer-category-link { color: var(--rci-offwhite); }
  .drawer-category-link:hover {
    color: var(--rci-red);
    padding-left: 6px;
  }
  .drawer-category-link::before {
    content: "·";
    margin-right: 6px;
    opacity: 0.5;
    font-weight: bold;
  }
  .drawer-category-link:hover::before {
    content: "→";
    color: var(--rci-red);
    opacity: 1;
  }

  /* Responsive Design */
  @media (max-width: 900px) {
    .menu-drawer-layout {
      flex-direction: column;
      gap: 24px;
    }
    .menu-drawer-sidebar {
      width: 100%;
      border-right: none;
      border-bottom: 2px solid var(--rule-soft);
      padding-right: 0;
      padding-bottom: 16px;
    }
    .menu-drawer-categories {
      grid-template-columns: repeat(2, 1fr);
    }
  }
  @media (max-width: 600px) {
    .menu-drawer-categories {
      grid-template-columns: 1fr;
    }
  }
